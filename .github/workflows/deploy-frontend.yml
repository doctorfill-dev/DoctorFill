# ------------------------------------------------------------------
# DoctorFill - Build & Deploy Frontend to Cloudflare Pages
# ------------------------------------------------------------------
# Declenche sur push vers main (uniquement si le frontend change)
# ou manuellement via workflow_dispatch.
#
# Secrets requis dans GitHub :
#   CLOUDFLARE_API_TOKEN  - Token API Cloudflare (permissions Pages)
#   CLOUDFLARE_ACCOUNT_ID - ID du compte Cloudflare
# ------------------------------------------------------------------

name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.doctorfill.ch

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=doctorfill
