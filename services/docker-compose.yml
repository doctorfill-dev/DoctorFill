# services/docker-compose.yml
services:
  vllm:
    container_name: df-services-vllm
    image: nvcr.io/nvidia/vllm:26.02-py3
    command: >
      vllm serve Qwen/Qwen2.5-14B-Instruct-AWQ
      --max-model-len 8192
      --gpu-memory-utilization 0.25
    ipc: host
    # [SEC-13] Port interne uniquement (pas exposé sur l'hôte)
    expose:
      - "8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s  # vLLM met du temps à charger le modèle
    restart: unless-stopped

  marker_ocr:
    container_name: df-services-marker_ocr
    build:
      context: ./marker_ocr
    image: df-image-marker
    # [SEC-13] Port interne uniquement (pas exposé sur l'hôte)
    expose:
      - "8082"
    environment:
      # Réduire la fragmentation mémoire CUDA sur mémoire unifiée (GB10)
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:256
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s  # Chargement des modèles vision en VRAM
    restart: unless-stopped

  tei:
    container_name: df-services-tei
    build:
      context: ./tei
    image: doctorfill/tei-service:latest
    # [SEC-13] Port interne uniquement (pas exposé sur l'hôte)
    expose:
      - "8081"
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 500s  # Chargement embedding + reranker
    restart: unless-stopped

  orchestrator:
    container_name: df-services-orchestrator
    build:
      context: ./orchestrator
    image: doctorfill/orchestrator:latest
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      vllm:
        condition: service_healthy
      marker_ocr:
        condition: service_healthy
      tei:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped